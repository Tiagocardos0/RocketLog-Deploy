services:
  api:
    container_name: rocketlog-api
    build:
      context: .
      dockerfile: Dockerfile
    image: rocketlog-api
    ports:
      - "3333:3333"
    env_file:
      - .env
    working_dir: /usr/src/app
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - postgres

  postgres:
    image: bitnami/postgresql:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: RocketLog
    volumes:
      - database:/bitnami/postgresql

volumes:
  database: